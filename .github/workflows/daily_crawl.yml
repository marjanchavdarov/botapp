name: Daily Price Crawl
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
jobs:
  crawl-batch-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: git clone https://github.com/senko/cijene-api.git
      - run: pip install beautifulsoup4 requests lxml httpx openpyxl pandas python-dotenv
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          for store in lidl konzum spar kaufland studenac; do
            echo "=== $store ===" 
            python ingestion/crawl_to_supabase.py --store $store || true
          done

  crawl-batch-2:
